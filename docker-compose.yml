services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: policypulse-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DEPLOYMENT_TARGET: docker
      POLICIES_DIR: data/policies
      FAISS_INDEX_PATH: storage/faiss.index
      BM25_INDEX_PATH: storage/bm25.pkl
      CHUNKS_PATH: storage/chunks.json
      LOG_PATH: storage/structured_logs.jsonl
    volumes:
      - ./data/policies:/app/data/policies
      - ./storage:/app/storage
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: policypulse-frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000
    restart: unless-stopped
